# Fallback list of programming language file extensions.
# Used when the live Linguist languages.yml cannot be fetched or parsed.
# Kept intentionally small — the live Linguist data is the authoritative source.
# Extensions are dot-prefixed strings (e.g., ".py", ".js").
extensions:
  - ".py"
  - ".ipynb"
  - ".R"
  - ".r"
  - ".js"
  - ".jsx"
  - ".ts"
  - ".tsx"
  - ".java"
  - ".c"
  - ".h"
  - ".hpp"
  - ".cc"
  - ".cpp"
  - ".go"
  - ".rs"
  - ".rb"
  - ".php"
  - ".cs"
  - ".swift"
  - ".kt"
  - ".m"
  - ".mm"
  - ".scala"
  - ".hs"
  - ".jl"
  - ".sh"
  - ".bash"
  - ".zsh"
  - ".ps1"
  - ".psm1"
  - ".pl"
  - ".pm"
  - ".sql"
  - ".dart"
  - ".lua"
  - ".clj"
  - ".cljs"
  - ".ex"
  - ".exs"
